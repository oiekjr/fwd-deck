version: "3"

tasks:
  default:
    desc: 利用可能なタスクを表示する
    cmds:
      - task --list

  fmt:
    desc: Rust コードを整形する
    cmds:
      - cargo fmt --all

  fmt:check:
    desc: Rust コードの整形差分を確認する
    cmds:
      - cargo fmt --all --check

  help:
    desc: CLI help を表示する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- --help

  test:
    desc: workspace 全体のテストを実行する
    cmds:
      - cargo test --workspace

  lint:
    desc: Clippy で警告をエラーとして検査する
    cmds:
      - cargo clippy --workspace -- -D warnings

  check:
    desc: 整形、テスト、lint をまとめて実行する
    deps:
      - fmt:check
      - test
      - lint

  list:
    desc: fwd-deck.toml で list を実行する
    preconditions:
      - sh: test -f fwd-deck.toml
        msg: fwd-deck.toml is required. Create it from fwd-deck.example.toml.
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- list

  start:
    desc: fwd-deck.toml で start を実行する
    preconditions:
      - sh: test -f fwd-deck.toml
        msg: fwd-deck.toml is required. Create it from fwd-deck.example.toml.
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- start

  recover:
    desc: stale なトンネルを再起動する
    preconditions:
      - sh: test -f fwd-deck.toml
        msg: fwd-deck.toml is required. Create it from fwd-deck.example.toml.
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- recover

  status:
    desc: status を実行する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- status

  stop:
    desc: stop を実行する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- stop

  config:add:
    desc: 対話形式で設定を追加する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- config add

  config:remove:
    desc: 対話形式で設定を削除する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- config remove

  validate:
    desc: fwd-deck.toml で validate を実行する
    preconditions:
      - sh: test -f fwd-deck.toml
        msg: fwd-deck.toml is required. Create it from fwd-deck.example.toml.
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- validate
