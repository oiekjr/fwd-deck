name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TAP_REPOSITORY: oiekjr/homebrew-tap

jobs:
  release:
    name: Publish unsigned binaries and Homebrew tap
    runs-on: macos-15
    timeout-minutes: 90

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: apps/fwd-deck-app
        run: npm ci

      - name: Resolve release version
        id: release
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          version="${tag_name#v}"
          if [ "$tag_name" = "$version" ]; then
            echo "Release tags must start with v, for example v0.1.0." >&2
            exit 1
          fi

          cli_version="$(cargo pkgid -p fwd-deck-cli | sed -E 's/.*[#@]//')"
          app_version="$(cargo pkgid -p fwd-deck-app | sed -E 's/.*[#@]//')"
          package_version="$(node -p "require('./apps/fwd-deck-app/package.json').version")"
          tauri_version="$(node -p "require('./apps/fwd-deck-app/src-tauri/tauri.conf.json').version")"

          if [ "$version" != "$cli_version" ] || [ "$version" != "$app_version" ] || [ "$version" != "$package_version" ] || [ "$version" != "$tauri_version" ]; then
            echo "The release tag must match package versions." >&2
            echo "tag=$version cli=$cli_version app=$app_version package=$package_version tauri=$tauri_version" >&2
            exit 1
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "app_asset_name=fwd-deck-app_${version}_universal.dmg" >> "$GITHUB_OUTPUT"
          echo "cli_aarch64_asset_name=fwd-deck_${version}_aarch64-apple-darwin.tar.gz" >> "$GITHUB_OUTPUT"
          echo "cli_x86_64_asset_name=fwd-deck_${version}_x86_64-apple-darwin.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "fwd-deck ${VERSION}"

      - name: Verify tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update the Homebrew tap." >&2
            exit 1
          fi

      - name: Build CLI release binaries
        run: |
          set -euo pipefail

          for target in aarch64-apple-darwin x86_64-apple-darwin; do
            cargo build --locked --release -p fwd-deck-cli --bin fwd-deck --target "$target"
          done

      - name: Build unsigned app bundle
        working-directory: apps/fwd-deck-app
        env:
          CI: true
        run: npm run tauri build -- --target universal-apple-darwin --bundles app

      - name: Collect release assets
        id: assets
        env:
          APP_ASSET_NAME: ${{ steps.release.outputs.app_asset_name }}
          CLI_AARCH64_ASSET_NAME: ${{ steps.release.outputs.cli_aarch64_asset_name }}
          CLI_X86_64_ASSET_NAME: ${{ steps.release.outputs.cli_x86_64_asset_name }}
        run: |
          set -euo pipefail

          search_roots=()
          for root in "$GITHUB_WORKSPACE/target" "$GITHUB_WORKSPACE/apps/fwd-deck-app/src-tauri/target"; do
            if [ -d "$root" ]; then
              search_roots+=("$root")
            fi
          done

          if [ "${#search_roots[@]}" -eq 0 ]; then
            echo "Tauri target directories were not found." >&2
            exit 1
          fi

          app_path="$(find "${search_roots[@]}" -path '*/universal-apple-darwin/release/bundle/macos/*.app' -type d | head -n 1)"

          if [ -z "$app_path" ]; then
            echo "Universal app bundle artifact was not found." >&2
            exit 1
          fi

          app_asset_path="$RUNNER_TEMP/$APP_ASSET_NAME"
          app_checksum_path="$app_asset_path.sha256"
          app_bundle_name="$(basename "$app_path")"
          app_staging_dir="$(mktemp -d "$RUNNER_TEMP/fwd-deck-app-dmg.XXXXXX")"
          raw_app_asset_path="$RUNNER_TEMP/raw-$APP_ASSET_NAME"

          ditto "$app_path" "$app_staging_dir/$app_bundle_name"
          ln -s /Applications "$app_staging_dir/Applications"
          hdiutil makehybrid -hfs -hfs-volume-name "Fwd Deck" -o "$raw_app_asset_path" "$app_staging_dir"
          hdiutil convert "$raw_app_asset_path" -format UDZO -imagekey zlib-level=9 -o "$app_asset_path"
          shasum -a 256 "$app_asset_path" | awk '{ print $1 }' > "$app_checksum_path"

          package_cli_asset() {
            target="$1"
            asset_name="$2"
            output_prefix="$3"
            binary_path="$GITHUB_WORKSPACE/target/$target/release/fwd-deck"
            staging_dir="$(mktemp -d "$RUNNER_TEMP/fwd-deck-$target.XXXXXX")"
            asset_path="$RUNNER_TEMP/$asset_name"
            checksum_path="$asset_path.sha256"

            if [ ! -x "$binary_path" ]; then
              echo "CLI binary was not found or is not executable: $binary_path" >&2
              exit 1
            fi

            cp "$binary_path" "$staging_dir/fwd-deck"
            tar -czf "$asset_path" -C "$staging_dir" fwd-deck
            shasum -a 256 "$asset_path" | awk '{ print $1 }' > "$checksum_path"

            echo "${output_prefix}_asset_path=$asset_path" >> "$GITHUB_OUTPUT"
            echo "${output_prefix}_checksum_path=$checksum_path" >> "$GITHUB_OUTPUT"
            echo "${output_prefix}_sha256=$(cat "$checksum_path")" >> "$GITHUB_OUTPUT"
          }

          package_cli_asset "aarch64-apple-darwin" "$CLI_AARCH64_ASSET_NAME" "cli_aarch64"
          package_cli_asset "x86_64-apple-darwin" "$CLI_X86_64_ASSET_NAME" "cli_x86_64"

          echo "app_asset_path=$app_asset_path" >> "$GITHUB_OUTPUT"
          echo "app_checksum_path=$app_checksum_path" >> "$GITHUB_OUTPUT"
          echo "dmg_sha256=$(cat "$app_checksum_path")" >> "$GITHUB_OUTPUT"
          echo "app_bundle_name=$app_bundle_name" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        env:
          APP_ASSET_PATH: ${{ steps.assets.outputs.app_asset_path }}
          APP_CHECKSUM_PATH: ${{ steps.assets.outputs.app_checksum_path }}
          CLI_AARCH64_ASSET_PATH: ${{ steps.assets.outputs.cli_aarch64_asset_path }}
          CLI_AARCH64_CHECKSUM_PATH: ${{ steps.assets.outputs.cli_aarch64_checksum_path }}
          CLI_X86_64_ASSET_PATH: ${{ steps.assets.outputs.cli_x86_64_asset_path }}
          CLI_X86_64_CHECKSUM_PATH: ${{ steps.assets.outputs.cli_x86_64_checksum_path }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail

          gh release upload "$TAG_NAME" \
            "$APP_ASSET_PATH" \
            "$APP_CHECKSUM_PATH" \
            "$CLI_AARCH64_ASSET_PATH" \
            "$CLI_AARCH64_CHECKSUM_PATH" \
            "$CLI_X86_64_ASSET_PATH" \
            "$CLI_X86_64_CHECKSUM_PATH"

      - name: Checkout Homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula and cask
        working-directory: homebrew-tap
        env:
          APP_BUNDLE_NAME: ${{ steps.assets.outputs.app_bundle_name }}
          CLI_AARCH64_SHA256: ${{ steps.assets.outputs.cli_aarch64_sha256 }}
          CLI_X86_64_SHA256: ${{ steps.assets.outputs.cli_x86_64_sha256 }}
          DMG_SHA256: ${{ steps.assets.outputs.dmg_sha256 }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p Formula Casks

          cat > Formula/fwd-deck.rb <<RUBY
          class FwdDeck < Formula
            desc "Manage SSH local port forwarding profiles"
            homepage "https://github.com/oiekjr/fwd-deck"
            version "$VERSION"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/oiekjr/fwd-deck/releases/download/v#{version}/fwd-deck_#{version}_aarch64-apple-darwin.tar.gz"
                sha256 "$CLI_AARCH64_SHA256"
              end

              on_intel do
                url "https://github.com/oiekjr/fwd-deck/releases/download/v#{version}/fwd-deck_#{version}_x86_64-apple-darwin.tar.gz"
                sha256 "$CLI_X86_64_SHA256"
              end
            end

            def install
              bin.install "fwd-deck"
            end

            test do
              assert_match "Usage:", shell_output("#{bin}/fwd-deck --help")
            end
          end
          RUBY

          cat > Casks/fwd-deck-app.rb <<RUBY
          cask "fwd-deck-app" do
            version "$VERSION"
            sha256 "$DMG_SHA256"

            url "https://github.com/oiekjr/fwd-deck/releases/download/v#{version}/fwd-deck-app_#{version}_universal.dmg",
                verified: "github.com/oiekjr/fwd-deck/"
            name "Fwd Deck"
            desc "GUI for fwd-deck local SSH port forwarding profiles"
            homepage "https://github.com/oiekjr/fwd-deck"

            app "$APP_BUNDLE_NAME", target: "Fwd Deck.app"

            zap trash: [
              "~/Library/Application Support/dev.oiekjr.fwddeck",
              "~/Library/Preferences/dev.oiekjr.fwddeck.plist",
              "~/Library/Saved Application State/dev.oiekjr.fwddeck.savedState",
            ]
          end
          RUBY

          ruby -c Formula/fwd-deck.rb
          ruby -c Casks/fwd-deck-app.rb

      - name: Commit Homebrew tap update
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          git status --short
          if [ -z "$(git status --porcelain -- Formula/fwd-deck.rb Casks/fwd-deck-app.rb)" ]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/fwd-deck.rb Casks/fwd-deck-app.rb
          git commit -m "fwd-deck $VERSION"
          git push
