version: "3"

tasks:
  default:
    desc: 利用可能なタスクを表示する
    cmds:
      - task --list

  fmt:
    desc: Rust コードを整形する
    cmds:
      - cargo fmt --all

  fmt:check:
    desc: Rust コードの整形差分を確認する
    cmds:
      - cargo fmt --all --check

  help:
    desc: CLI help を表示する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- --help

  completion:zsh:
    desc: zsh 補完スクリプトを表示する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- completion zsh

  test:
    desc: workspace 全体のテストを実行する
    cmds:
      - cargo test --workspace

  lint:
    desc: Clippy で警告をエラーとして検査する
    cmds:
      - cargo clippy --workspace -- -D warnings

  check:
    desc: 整形、テスト、lint をまとめて実行する
    deps:
      - fmt:check
      - app:format:check
      - app:build:web
      - app:lint
      - test
      - lint

  app:install:
    desc: macOS アプリのフロントエンド依存関係をインストールする
    dir: apps/fwd-deck-app
    cmds:
      - npm install

  app:dev:
    desc: Tauri アプリを開発モードで起動する
    dir: apps/fwd-deck-app
    cmds:
      - npm run tauri dev

  app:build:web:
    desc: Tauri アプリのフロントエンドをビルドする
    dir: apps/fwd-deck-app
    cmds:
      - npm run build

  app:lint:
    desc: Tauri アプリのフロントエンドを ESLint で検査する
    dir: apps/fwd-deck-app
    cmds:
      - npm run lint

  app:format:
    desc: Tauri アプリのフロントエンドを Prettier で整形する
    dir: apps/fwd-deck-app
    cmds:
      - npm run format

  app:format:check:
    desc: Tauri アプリのフロントエンド整形差分を確認する
    dir: apps/fwd-deck-app
    cmds:
      - npm run format:check

  app:check:
    desc: Tauri アプリの Rust command 層を検査する
    cmds:
      - cargo check -p fwd-deck-app

  list:
    desc: 既定設定で list を実行する
    preconditions:
      - sh: test -f fwd-deck.toml || test -f "$HOME/.config/fwd-deck/config.toml"
        msg: fwd-deck.toml or ~/.config/fwd-deck/config.toml is required.
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- list

  start:
    desc: 既定設定で start を実行する
    preconditions:
      - sh: test -f fwd-deck.toml || test -f "$HOME/.config/fwd-deck/config.toml"
        msg: fwd-deck.toml or ~/.config/fwd-deck/config.toml is required.
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- start

  start:dry-run:
    desc: 既定設定で start の実行予定を確認する
    preconditions:
      - sh: test -f fwd-deck.toml || test -f "$HOME/.config/fwd-deck/config.toml"
        msg: fwd-deck.toml or ~/.config/fwd-deck/config.toml is required.
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- start --all --dry-run

  recover:
    desc: stale なトンネルを再起動する
    preconditions:
      - sh: test -f fwd-deck.toml || test -f "$HOME/.config/fwd-deck/config.toml"
        msg: fwd-deck.toml or ~/.config/fwd-deck/config.toml is required.
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- recover

  watch:
    desc: 追跡中トンネルを監視して stale 時に再起動する
    preconditions:
      - sh: test -f fwd-deck.toml || test -f "$HOME/.config/fwd-deck/config.toml"
        msg: fwd-deck.toml or ~/.config/fwd-deck/config.toml is required.
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- watch

  status:
    desc: status を実行する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- status

  stop:
    desc: stop を実行する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- stop

  stop:dry-run:
    desc: stop の実行予定を確認する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- stop --all --dry-run

  config:add:
    desc: 対話形式で設定を追加する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- config add

  config:remove:
    desc: 対話形式で設定を削除する
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- config remove

  validate:
    desc: 既定設定で validate を実行する
    preconditions:
      - sh: test -f fwd-deck.toml || test -f "$HOME/.config/fwd-deck/config.toml"
        msg: fwd-deck.toml or ~/.config/fwd-deck/config.toml is required.
    cmds:
      - cargo run -p fwd-deck-cli --bin fwd-deck -- validate
